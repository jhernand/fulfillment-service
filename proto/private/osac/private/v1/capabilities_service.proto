syntax = "proto3";

package osac.private.v1;

import "google/api/annotations.proto";
import "osac/private/v1/authn_capabilities_type.proto";

// Request message for the `Get` method of the `Capabilities` service.
message CapabilitiesGetRequest {}

// Response message for the `Get` method of the `Capabilities` service.
message CapabilitiesGetResponse {
  // Authentication capabilities of the server.
  AuthnCapabilities authn = 1;
}

// Provides information about the capabilities of the server, such as the list of trusted token issuers for
// authentication. This is the private API equivalent and requires authentication.
service Capabilities {
  // Returns the capabilities of the server, including the authentication configuration that clients need in order to
  // obtain access tokens.
  rpc Get(CapabilitiesGetRequest) returns (CapabilitiesGetResponse) {
    option (google.api.http) = {get: "/api/private/v1/capabilities"};
  }
}
