syntax = "proto3";

package osac.private.v1;

import "google/protobuf/timestamp.proto";
import "osac/private/v1/metadata_type.proto";

enum InstanceTypeState {
  INSTANCE_TYPE_STATE_UNSPECIFIED = 0;
  INSTANCE_TYPE_STATE_ACTIVE = 1;
  INSTANCE_TYPE_STATE_DEPRECATED = 2;
  INSTANCE_TYPE_STATE_OBSOLETE = 3;
}

message InstanceTypeDeprecation {
  InstanceTypeState state = 1;
  string replacement = 2;
  optional google.protobuf.Timestamp deprecated = 3;
  optional google.protobuf.Timestamp obsolete = 4;
}

message InstanceType {
  string name = 1;
  Metadata metadata = 2;
  int32 cores = 3;
  int32 memory_gib = 4;
  string description = 5;
  InstanceTypeState state = 6;
  InstanceTypeDeprecation deprecation = 7;
  string id = 8;
}
