apiVersion: v1
kind: Service
metadata:
  name: fulfillment-api
  labels:
    app: fullfillment-service
spec:
  selector:
    app: fulfillment-service
  ports:
  - name: envoy-api
    port: 9000
    targetPort: envoy-api
    
---

apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: fulfillment-api
spec:
  host: fulfillment-api.innabox.testing
  to:
    kind: Service
    name: fulfillment-api
  port:
    targetPort: envoy-api 
  tls:
    termination: passthrough
